<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>図形合わせトレーニング - 1.5</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #fff4f4; margin: 0; padding: 10px; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
        .header-area { background: white; padding: 12px; border-radius: 15px; margin-bottom: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { font-size: 22px; margin: 0; color: #d32f2f; }
        .instructions { font-size: 16px; font-weight: bold; color: #5a4a42; margin: 5px 0; }

        #game-canvas { background: #ffffff; border: 3px solid #d32f2f; border-radius: 15px; max-width: 100%; height: auto; display: block; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .btn-group { margin-top: 10px; display: flex; justify-content: center; gap: 20px; }
        button { border: none; padding: 15px 40px; font-size: 22px; border-radius: 15px; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }
        #same-btn { background: #4caf50; box-shadow: 0 5px #388e3c; }
        #diff-btn { background: #f44336; box-shadow: 0 5px #d32f2f; }
        #start-btn { background: #ff7043; box-shadow: 0 5px #d84315; }
        #retry-btn { background: #8fbeb3; box-shadow: 0 5px #6a9a8f; display: none; }
        button:active { transform: translateY(3px); box-shadow: none; }

        #setup { background: white; padding: 25px; border-radius: 20px; display: inline-block; margin-top: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: left; }
        .setting-item { margin: 15px 0; font-size: 18px; font-weight: bold; }
        input[type="range"] { width: 160px; vertical-align: middle; }
        
        #status-bar { font-size: 18px; font-weight: bold; margin-bottom: 5px; display: none; }
        #timer { color: #e57373; font-size: 22px; }
        #msg { font-size: 24px; font-weight: bold; margin-top: 10px; min-height: 35px; }
    </style>
</head>
<body>

<div class="header-area">
    <h1>図形合わせトレーニング 1.5</h1>
    <p class="instructions">左右の「形の種類」が同じなら「同じ」、違えば「違う」を押してね！</p>
</div>

<div id="setup">
    <div class="setting-item">⏱ 制限時間：<input type="range" id="time-slider" min="3" max="30" value="10" oninput="document.getElementById('t-val').innerText = this.value"> <span id="t-val">10</span>秒</div>
    <div class="setting-item">🔢 出題数　：<input type="range" id="count-slider" min="1" max="20" value="10" oninput="document.getElementById('c-val').innerText = this.value"> <span id="c-val">10</span>問</div>
    <div style="text-align:center;"><button id="start-btn" onclick="startGame()">▶︎ スタート！</button></div>
</div>

<div id="game-area" style="display:none;">
    <div id="status-bar">第 <span id="current-q">1</span> / <span id="total-q">10</span> 問目 ｜ <span id="timer">残り <span id="time-left">10</span>秒</span></div>
    <canvas id="game-canvas" width="900" height="500"></canvas>
    <div id="msg"></div>
    <div class="btn-group">
        <button id="same-btn" onclick="judge(true)">⭕️ 同じ</button>
        <button id="diff-btn" onclick="judge(false)">❌ 違う</button>
        <button id="retry-btn" onclick="location.reload()">もう一度！</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    let leftShapes = [], rightShapes = [], isCorrectSame = true;
    let timeLeft, totalQuestions, currentNum, correctCount, timerId, isGameRunning = false;

    const shapeTypes = [
        { name: 'circle', color: 'orange' }, { name: 'rect', color: 'skyblue' },
        { name: 'triangle', color: 'green' }, { name: 'diamond', color: 'purple' }, { name: 'cross', color: 'red' }
    ];

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // 背景の仕切り
        ctx.fillStyle = '#fdfdfd'; ctx.fillRect(40, 50, 400, 400); ctx.fillRect(460, 50, 400, 400);
        ctx.strokeStyle = '#ccc'; ctx.lineWidth = 2; ctx.strokeRect(40, 50, 400, 400); ctx.strokeRect(460, 50, 400, 400);
        
        if (!isGameRunning && currentNum > totalQuestions) return;

        leftShapes.forEach(s => drawShape(s.type, s.color, s.x, s.y, 35));
        rightShapes.forEach(s => drawShape(s.type, s.color, s.x, s.y, 35));
    }

    function drawShape(type, color, x, y, size) {
        ctx.fillStyle = color; ctx.strokeStyle = color; ctx.lineWidth = 6; ctx.beginPath();
        if(type === 'circle') ctx.arc(x, y, size, 0, Math.PI*2);
        else if(type === 'rect') ctx.rect(x-size, y-size, size*2, size*2);
        else if(type === 'triangle') { ctx.moveTo(x, y-size); ctx.lineTo(x-size, y+size); ctx.lineTo(x+size, y+size); ctx.closePath(); }
        else if(type === 'diamond') { ctx.moveTo(x, y-size-5); ctx.lineTo(x-size, y); ctx.lineTo(x, y+size+5); ctx.lineTo(x+size, y); ctx.closePath(); }
        else if(type === 'cross') { ctx.moveTo(x-size+5, y-size+5); ctx.lineTo(x+size-5, y+size-5); ctx.moveTo(x+size-5, y-size+5); ctx.lineTo(x-size+5, y+size-5); }
        type === 'cross' ? ctx.stroke() : (ctx.fill(), ctx.stroke());
    }

    function createProblem() {
        leftShapes = []; rightShapes = [];
        // 正解が「同じ」か「違う」かをランダムに決める
        isCorrectSame = Math.random() > 0.5;
        
        let basePool = [...shapeTypes].sort(() => Math.random() - 0.5).slice(0, 3);
        let otherPool = [...shapeTypes].filter(s => !basePool.includes(s));

        // 右（見本）の作成
        basePool.forEach(s => rightShapes.push({ type: s.name, color: s.color, x: 460 + 60 + Math.random()*280, y: 50 + 60 + Math.random()*280 }));

        // 左（問題）の作成
        let leftPool = isCorrectSame ? basePool : [...basePool.slice(0, 2), otherPool[0]];
        leftPool.forEach(s => leftShapes.push({ type: s.name, color: s.color, x: 40 + 60 + Math.random()*280, y: 50 + 60 + Math.random()*280 }));
    }

    function startGame() {
        totalQuestions = parseInt(document.getElementById('count-slider').value);
        currentNum = 1; correctCount = 0;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        document.getElementById('status-bar').style.display = 'block';
        document.getElementById('total-q').innerText = totalQuestions;
        nextRound();
    }

    function nextRound() {
        if (currentNum > totalQuestions) { showResult(); return; }
        document.getElementById('current-q').innerText = currentNum;
        document.getElementById('msg').innerText = "";
        timeLeft = parseInt(document.getElementById('time-slider').value);
        document.getElementById('time-left').innerText = timeLeft;
        isGameRunning = true; createProblem(); draw(); startTimer();
    }

    function startTimer() {
        if(timerId) clearInterval(timerId);
        timerId = setInterval(() => {
            timeLeft--; document.getElementById('time-left').innerText = timeLeft;
            if(timeLeft <= 0) judge(null);
        }, 1000);
    }

    function judge(userAnswer) {
        if (!isGameRunning) return;
        clearInterval(timerId); isGameRunning = false;
        
        const isCorrect = (userAnswer === isCorrectSame);
        if (userAnswer === null) { document.getElementById('msg').innerText = "⏰ タイムアップ！"; document.getElementById('msg').style.color = "#ff9800"; }
        else if (isCorrect) { correctCount++; document.getElementById('msg').innerText = "✨ 正解！ ✨"; document.getElementById('msg').style.color = "#4caf50"; }
        else { document.getElementById('msg').innerText = "❌ ちがうよ"; document.getElementById('msg').style.color = "#e57373"; }
        
        currentNum++; setTimeout(nextRound, 1000);
    }

    function showResult() {
        isGameRunning = false; document.getElementById('status-bar').style.display = 'none';
        document.getElementById('same-btn').style.display = 'none'; document.getElementById('diff-btn').style.display = 'none';
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.getElementById('msg').innerHTML = `🏁 終了！<br><span style="font-size:36px;">${totalQuestions}問中 ${correctCount}問正解！</span>`;
        document.getElementById('retry-btn').style.display = 'inline-block';
    }
</script>
</body>
</html>
